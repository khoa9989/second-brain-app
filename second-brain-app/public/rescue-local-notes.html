<!doctype html><html lang="vi"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Rescue Second Brain Notes</title><style>body{font-family:Inter,Arial,sans-serif;background:#0b1220;color:#eef4ff;padding:24px}button{padding:10px 14px;border-radius:10px;border:1px solid #334155;background:#1e293b;color:#fff;cursor:pointer;margin-right:8px}textarea{width:100%;min-height:280px;margin-top:14px;background:#020617;color:#93c5fd;border:1px solid #334155;border-radius:12px;padding:12px}code{background:#111827;padding:2px 6px;border-radius:6px}</style><h1>Rescue local Second Brain notes</h1><p>Trang này đọc localStorage ngay trên browser hiện tại. Nếu máy/browser này còn dữ liệu cũ, nó sẽ hiện ra để cứu và đẩy thẳng lên server.</p><button id="scan">Quét dữ liệu local</button><button id="push">Đẩy lên server ngay</button><button id="copy">Copy JSON</button><div id="meta" style="margin-top:12px;color:#93c5fd"></div><textarea id="out" placeholder="JSON notes sẽ hiện ở đây..."></textarea><script>const candidates=['sb_category_pro_notes','second_brain_notes','sb_notes','notes'];let selected=[];function scan(){let found=[];for(const k of candidates){try{const raw=localStorage.getItem(k);if(!raw)continue;const data=JSON.parse(raw);if(Array.isArray(data)&&data.length)found.push({key:k,count:data.length,data});}catch(e){}}const out=document.getElementById('out');const meta=document.getElementById('meta');if(!found.length){meta.textContent='Không tìm thấy note nào trong các key mặc định trên browser này.';out.value='';selected=[];return;}found.sort((a,b)=>b.count-a.count);selected=found[0].data;meta.innerHTML=found.map(f=>`Tìm thấy <code>${f.key}</code>: ${f.count} notes`).join('<br>');out.value=JSON.stringify(selected,null,2);}async function push(){const meta=document.getElementById('meta');if(!selected.length){meta.textContent='Chưa có dữ liệu để đẩy. Bấm Quét dữ liệu local trước.';return;}try{const r=await fetch('/.netlify/functions/set-notes',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({notes:selected})});const t=await r.text();meta.textContent='Đã đẩy lên server: '+t;}catch(e){meta.textContent='Lỗi đẩy server: '+(e&&e.message||e);} }document.getElementById('scan').onclick=scan;document.getElementById('push').onclick=push;document.getElementById('copy').onclick=async()=>{const out=document.getElementById('out').value||'';try{await navigator.clipboard.writeText(out);}catch(_){const ta=document.getElementById('out');ta.select();document.execCommand('copy');}};</script></html>
