<!doctype html><html lang="vi"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Rescue Second Brain Notes v2</title><style>body{font-family:Inter,Arial,sans-serif;background:#0b1220;color:#eef4ff;padding:24px}button{padding:10px 14px;border-radius:10px;border:1px solid #334155;background:#1e293b;color:#fff;cursor:pointer;margin:6px 8px 6px 0}textarea{width:100%;min-height:320px;margin-top:14px;background:#020617;color:#93c5fd;border:1px solid #334155;border-radius:12px;padding:12px}code{background:#111827;padding:2px 6px;border-radius:6px}.card{border:1px solid #334155;border-radius:14px;padding:14px;margin:12px 0;background:#0f172a}.ok{color:#86efac}.warn{color:#fcd34d}</style><h1>Rescue Second Brain Notes v2</h1><p>Trang này quét tất cả localStorage trên browser hiện tại, tìm các mảng notes hợp lệ, và cho anh chọn đúng bộ để đẩy lên server chung.</p><button id="scan">Quét dữ liệu local</button><div id="list"></div><div id="meta" style="margin-top:12px;color:#93c5fd"></div><textarea id="out" placeholder="JSON của bộ notes anh chọn sẽ hiện ở đây..."></textarea><script>const preferred=['sb_category_pro_notes','second_brain_notes','sb_notes','notes'];let selected=[];let selectedKey='';function isNoteLike(x){return x&&typeof x==='object'&&!Array.isArray(x)&&('title'in x||'content'in x||'tags'in x||'category'in x||'topic'in x);}function scanAll(){const found=[];for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);try{const raw=localStorage.getItem(k);if(!raw||raw.length<2)continue;const data=JSON.parse(raw);if(Array.isArray(data)&&data.length&&data.some(isNoteLike)){found.push({key:k,count:data.length,data,sample:(data[0]?.title||data[0]?.content||'').toString().slice(0,80)});}}catch(e){}}found.sort((a,b)=>{const pa=preferred.indexOf(a.key);const pb=preferred.indexOf(b.key);if(pa!==-1||pb!==-1)return (pa===-1?999:pa)-(pb===-1?999:pb);return b.count-a.count;});return found;}function choose(item){selected=item.data;selectedKey=item.key;document.getElementById('out').value=JSON.stringify(item.data,null,2);document.getElementById('meta').innerHTML='Đã chọn <code>'+item.key+'</code> với <b>'+item.count+'</b> notes. Mẫu: '+escapeHtml(item.sample||'(trống)');}async function push(item){choose(item);const meta=document.getElementById('meta');try{const r=await fetch('/.netlify/functions/set-notes',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({notes:item.data})});const t=await r.text();meta.innerHTML='<span class="ok">Đã đẩy bộ <code>'+item.key+'</code> lên server.</span> Phản hồi: '+escapeHtml(t);}catch(e){meta.innerHTML='<span class="warn">Lỗi đẩy server:</span> '+escapeHtml(String(e&&e.message||e));}}function escapeHtml(s){return String(s).replace(/[&<>\"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}function render(){const found=scanAll();const list=document.getElementById('list');if(!found.length){list.innerHTML='<div class="card warn">Không tìm thấy mảng notes hợp lệ nào trong localStorage browser này.</div>';return;}list.innerHTML=found.map((f,idx)=>'<div class="card"><div><b>Key:</b> <code>'+escapeHtml(f.key)+'</code></div><div><b>Số notes:</b> '+f.count+'</div><div><b>Mẫu note đầu:</b> '+escapeHtml(f.sample||'(trống)')+'</div><div><button data-action="view" data-idx="'+idx+'">Xem JSON</button><button data-action="push" data-idx="'+idx+'">Đẩy bộ này lên server</button></div></div>').join('');list.querySelectorAll('button').forEach(btn=>btn.onclick=()=>{const item=found[Number(btn.dataset.idx)];if(btn.dataset.action==='view') choose(item); else push(item);});}document.getElementById('scan').onclick=render;render();</script></html>
