<!doctype html><html lang="vi"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Second Brain Category Preview V2</title><style>body{margin:0;font-family:Inter,Arial;background:#081325;color:#eef4ff;overflow:hidden}.app{display:grid;grid-template-columns:340px 1fr;height:100vh}.left{padding:14px;background:#0c152b;border-right:1px solid #24324d;overflow:auto}.main{position:relative}.row{display:flex;gap:8px}.row>*{flex:1}input,textarea,button{width:100%;padding:9px;border-radius:10px;border:1px solid #24324d;background:#111b35;color:#eef4ff}textarea{min-height:80px}.topic,.cat{border:1px solid #24324d;border-radius:10px;margin-top:8px}.head{padding:8px;cursor:pointer;display:flex;justify-content:space-between}.children{padding:0 8px 8px}.item{padding:8px;border:1px solid #24324d;border-radius:8px;margin-top:6px;cursor:pointer}.graph{position:absolute;inset:0}.brain{position:absolute;transform:translate(-50%,-50%);width:72px;height:72px;border-radius:999px;border:2px solid #22d3ee;background:rgba(124,58,237,.2);display:flex;align-items:center;justify-content:center;z-index:2;cursor:grab}#canvas{position:absolute;inset:0;z-index:1}#nodes{position:absolute;inset:0;z-index:3}.node{position:absolute;transform:translate(-50%,-50%);padding:7px 11px;border-radius:999px;border:1px solid #4f46e5;background:rgba(17,27,53,.86);cursor:grab;white-space:nowrap}.detail{position:absolute;top:14px;right:14px;width:360px;max-height:80vh;overflow:auto;background:#0c152b;border:1px solid #24324d;border-radius:12px;padding:12px;display:none;z-index:5}</style></head><body><div class="app"><aside class="left"><h3>Category Preview V2</h3><div class="row"><input id="category" placeholder="Category"/><input id="title" placeholder="Chủ đề"/></div><div style="height:8px"></div><input id="tags" placeholder="tags a,b"/><div style="height:8px"></div><textarea id="content" placeholder="Nội dung"></textarea><div style="height:8px"></div><button onclick="addNote()">Lưu</button><div id="tree"></div></aside><main class="main"><div class="graph"><canvas id="canvas"></canvas><div id="brain" class="brain">BRAIN</div><div id="nodes"></div><div id="detail" class="detail"></div></div></main></div><script>const K='sb_v2_notes',P='sb_v2_pos',B='sb_v2_brain';let selected=null;let collapsed={};function notes(){return JSON.parse(localStorage.getItem(K)||'[]')}function save(n){localStorage.setItem(K,JSON.stringify(n))}function pos(){return JSON.parse(localStorage.getItem(P)||'{}')}function savePos(p){localStorage.setItem(P,JSON.stringify(p))}function brain(){return JSON.parse(localStorage.getItem(B)||'null')}function saveBrain(b){localStorage.setItem(B,JSON.stringify(b))}if(!localStorage.getItem(K))save([{id:'n1',category:'General',title:'Openclaw',content:'Agent runtime notes',tags:['agent']}]);function addNote(){const category=(categoryEl.value||'General').trim();const title=titleEl.value.trim();const content=contentEl.value.trim();if(!title||!content)return;const tags=(tagsEl.value||'').split(',').map(s=>s.trim()).filter(Boolean);const arr=notes();arr.push({id:'n'+Date.now(),category,title,content,tags});save(arr);renderAll()}const categoryEl=document.getElementById('category'),titleEl=document.getElementById('title'),contentEl=document.getElementById('content'),tagsEl=document.getElementById('tags');function grouped(){const g={};for(const n of notes()){((g[n.category||'General']??={})[n.title]??=[]).push(n)}return g}function renderTree(){const tree=document.getElementById('tree');tree.innerHTML='';const g=grouped();Object.keys(g).sort().forEach(c=>{const cat=document.createElement('div');cat.className='cat';const ck='c:'+c;cat.innerHTML=`<div class='head'>${c}<span>${collapsed[ck]?'▶':'▼'}</span></div><div class='children' style='display:${collapsed[ck]?'none':'block'}'></div>`;cat.querySelector('.head').onclick=()=>{collapsed[ck]=!collapsed[ck];renderTree()};const ch=cat.querySelector('.children');Object.keys(g[c]).sort().forEach(t=>{const tk='t:'+c+'::'+t;const topic=document.createElement('div');topic.className='topic';topic.innerHTML=`<div class='head'>${t}<span>${collapsed[tk]?'▶':'▼'}</span></div><div class='children' style='display:${collapsed[tk]?'none':'block'}'></div>`;topic.querySelector('.head').onclick=()=>{collapsed[tk]=!collapsed[tk];renderTree()};const tch=topic.querySelector('.children');g[c][t].forEach(n=>{const it=document.createElement('div');it.className='item';it.textContent=n.content.slice(0,60);it.onclick=()=>showDetail({title:n.title,content:n.content,tags:n.tags});tch.appendChild(it)});ch.appendChild(topic)});tree.appendChild(cat)})}function topicNodes(){const map={};for(const n of notes()){const k=n.title||'Untitled';if(!map[k])map[k]={id:'topic:'+k,title:k,content:n.content||'',tags:[...(n.tags||[])]};else{map[k].content+='\n- '+(n.content||'');map[k].tags=[...new Set([...map[k].tags,...(n.tags||[])])]}}return Object.values(map)}function metrics(){const r=document.querySelector('.main').getBoundingClientRect();return{w:r.width,h:r.height,cx:r.width*.5,cy:r.height*.52,nodeCy:r.height*.58}}function draw(){const cv=document.getElementById('canvas'),ctx=cv.getContext('2d');const m=metrics(),dpr=window.devicePixelRatio||1;cv.width=m.w*dpr;cv.height=m.h*dpr;cv.style.width=m.w+'px';cv.style.height=m.h+'px';ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,m.w,m.h);const ns=topicNodes(),ps=pos(),b=brain()||{x:m.cx,y:m.cy};for(let i=0;i<ns.length;i++){for(let j=i+1;j<ns.length;j++){const a=ns[i],c=ns[j],shared=(a.tags||[]).filter(t=>(c.tags||[]).includes(t)).length;if(shared){ctx.strokeStyle='rgba(167,139,250,.45)';ctx.lineWidth=1+shared*.8;ctx.beginPath();ctx.moveTo(ps[a.id].x,ps[a.id].y);ctx.lineTo(ps[c.id].x,ps[c.id].y);ctx.stroke()}}}for(const n of ns){ctx.strokeStyle='rgba(120,170,255,.55)';ctx.lineWidth=1.8;ctx.beginPath();ctx.moveTo(b.x,b.y);ctx.lineTo(ps[n.id].x,ps[n.id].y);ctx.stroke()}}function ensurePos(){const ns=topicNodes(),ps=pos(),m=metrics();ns.forEach((n,i)=>{if(!ps[n.id]){const a=(Math.PI*2*i)/Math.max(ns.length,1),r=Math.min(260,120+ns.length*18);ps[n.id]={x:m.cx+Math.cos(a)*r,y:m.nodeCy+Math.sin(a)*r*.58,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2}});savePos(ps)}function renderNodes(){const ns=topicNodes(),ps=pos(),wrap=document.getElementById('nodes');wrap.innerHTML='';ns.forEach(n=>{const d=document.createElement('div');d.className='node';d.dataset.id=n.id;d.style.left=ps[n.id].x+'px';d.style.top=ps[n.id].y+'px';d.textContent=n.title;let sx,sy,ox,oy,drag=false,mv=false;d.onmousedown=e=>{e.preventDefault();sx=e.clientX;sy=e.clientY;ox=ps[n.id].x;oy=ps[n.id].y;drag=true;mv=false;document.onmousemove=m=>{if(!drag)return;const nx=ox+(m.clientX-sx),ny=oy+(m.clientY-sy);if(Math.abs(m.clientX-sx)>4||Math.abs(m.clientY-sy)>4)mv=true;ps[n.id].x=nx;ps[n.id].y=ny;d.style.left=nx+'px';d.style.top=ny+'px';savePos(ps);draw()};document.onmouseup=()=>{drag=false;document.onmousemove=null;document.onmouseup=null;if(!mv){selected=n.id}}};d.ondblclick=e=>{e.preventDefault();showDetail(n)};wrap.appendChild(d)})}function animate(){const ns=topicNodes(),ps=pos();const m=metrics(),b=brain()||{x:m.cx,y:m.cy};for(const n of ns){const p=ps[n.id];p.vx+=(b.x-p.x)*0.00008;p.vy+=(Math.max(b.y+40,m.nodeCy)-p.y)*0.00006;p.vx*=.96;p.vy*=.96;p.x+=p.vx;p.y+=p.vy}savePos(ps);document.querySelectorAll('.node').forEach(el=>{const p=ps[el.dataset.id];if(p){el.style.left=p.x+'px';el.style.top=p.y+'px'}});draw();requestAnimationFrame(animate)}function initBrain(){const b=document.getElementById('brain');const m=metrics();const bp=brain()||{x:m.cx,y:m.cy};b.style.left=bp.x+'px';b.style.top=bp.y+'px';let sx,sy,ox,oy,drag=false;b.onmousedown=e=>{e.preventDefault();sx=e.clientX;sy=e.clientY;ox=bp.x;oy=bp.y;drag=true;document.onmousemove=m=>{if(!drag)return;const mx=metrics();const nx=Math.max(60,Math.min(mx.w-60,ox+(m.clientX-sx))),ny=Math.max(60,Math.min(mx.h-60,oy+(m.clientY-sy)));b.style.left=nx+'px';b.style.top=ny+'px';saveBrain({x:nx,y:ny});draw()};document.onmouseup=()=>{drag=false;document.onmousemove=null;document.onmouseup=null}}}function showDetail(n){const d=document.getElementById('detail');d.style.display='block';d.innerHTML=`<b>${n.title}</b><div style='margin:8px 0'>${(n.tags||[]).map(t=>`#${t}`).join(' ')}</div><div style='white-space:pre-wrap'>${n.content||''}</div><div style='margin-top:10px'><button onclick="document.getElementById('detail').style.display='none'">Ẩn</button></div>`}function renderAll(){renderTree();ensurePos();initBrain();renderNodes();draw()}window.onresize=renderAll;renderAll();animate();</script></body></html>
